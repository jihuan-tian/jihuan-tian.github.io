<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <!-- The data-pagefind-body attribute tells Pagefind to only index what is inside this tag -->
    <main class="page-content" aria-label="Content" data-pagefind-body>
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

  </body>

</html>
